<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <div class="row"></div>
    </header>

    <main>
        <div class="container-fluid">
            <section>
                <div class="row pb-4">
                    <div class="col-4 bg-light"></div>
                    <div class="col-8 bg-secondary pb-5 @media (min-width: 1200px) { ... }"></div>

                </div>
            </section>


            <section>
                <div class="row pb-4">
                    <div class="col-4 bg-primary"></div>
                    <div class="col-4 bg-success"></div>
                    <div class="col-4 bg-danger"></div>

            </section>


            <section>
                <div class="row pb-4">
                    <div class="col-3 bg-info"></div>
                    <div class="col-3 bg-warning"></div>
                    <div class="col-3 bg-dark"></div>
                    <div class="col-3 bg-light"></div>

            </section>

        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"></script>
    </main>
</body>

</html>
